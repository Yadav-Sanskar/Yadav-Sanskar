  <rect x="260" y="12" width="40" height="16" rx="2" fill="#0D1117" stroke="#00E5FF" stroke-width="0.8" opacity="0.6"/>
  <text x="280" y="23" text-anchor="middle" font-size="7" fill="#00E5FF" font-family="monospace" opacity="0.8">I2C</text>
  <line x1="300" y1="20" x2="360" y2="20" stroke="#00E5FF" stroke-width="0.8" opacity="0.4"/>
  <!-- CAN center -->
  <rect x="410" y="10" width="80" height="20" rx="2" fill="#0D1117" stroke="#00FF88" stroke-width="1" opacity="0.7"/>
  <text x="450" y="24" text-anchor="middle" font-size="8" fill="#00FF88" font-family="monospace" opacity="0.85">CAN BUS</text>
  <line x1="360" y1="20" x2="410" y2="20" stroke="#00FF88" stroke-width="1" opacity="0.5"/>
  <line x1="490" y1="20" x2="540" y2="20" stroke="#00FF88" stroke-width="1" opacity="0.5"/>
  <!-- right side mirror -->
  <polyline points="540,20 555,20 555,10 570,10 570,20 585,20 585,10 600,10 600,20 615,20" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.6"/>
