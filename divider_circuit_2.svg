  <rect x="30" y="12" width="50" height="16" rx="2" fill="#0D1117" stroke="#00FF88" stroke-width="0.8" opacity="0.7"/>
  <text x="55" y="23" text-anchor="middle" font-size="7" fill="#00FF88" font-family="monospace" opacity="0.85">UART</text>
  <line x1="80" y1="20" x2="120" y2="20" stroke="#00FF88" stroke-width="1" opacity="0.5"/>
  <!-- SPI waveform -->
  <polyline points="130,20 140,20 140,10 155,10 155,20 170,20 170,10 185,10 185,20 200,20" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.6"/>
  <text x="165" y="36" text-anchor="middle" font-size="6" fill="#00E5FF" font-family="monospace" opacity="0.6">SPI</text>
  <line x1="200" y1="20" x2="240" y2="20" stroke="#00E5FF" stroke-width="0.8" opacity="0.4"/>
