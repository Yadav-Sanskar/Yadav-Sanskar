  <rect x="650" y="12" width="50" height="16" rx="2" fill="#0D1117" stroke="#00E5FF" stroke-width="0.8" opacity="0.6"/>
  <text x="675" y="23" text-anchor="middle" font-size="7" fill="#00E5FF" font-family="monospace" opacity="0.8">GPIO</text>
  <line x1="700" y1="20" x2="740" y2="20" stroke="#00E5FF" stroke-width="0.8" opacity="0.4"/>
  <rect x="750" y="12" width="60" height="16" rx="2" fill="#0D1117" stroke="#00FF88" stroke-width="0.8" opacity="0.7"/>
  <text x="780" y="23" text-anchor="middle" font-size="7" fill="#00FF88" font-family="monospace" opacity="0.85">FreeRTOS</text>
  <line x1="810" y1="20" x2="870" y2="20" stroke="#00FF88" stroke-width="0.8" opacity="0.4"/>
  <circle cx="870" cy="20" r="3" fill="#00FF88" opacity="0.7"/>
