<svg width="900" height="40" viewBox="0 0 900 40" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="40" fill="#0D1117"/>
  <line x1="0" y1="20" x2="900" y2="20" stroke="#00E5FF" stroke-width="0.6" opacity="0.25"/>
  <!-- binary/hex stream left -->
  <text x="20" y="17" font-size="7" fill="#00E5FF" opacity="0.35" font-family="monospace">0xFF</text>
  <text x="55" y="17" font-size="7" fill="#00FF88" opacity="0.3" font-family="monospace">0xA0</text>
  <text x="90" y="17" font-size="7" fill="#00E5FF" opacity="0.25" font-family="monospace">0x3F</text>
  <text x="20" y="30" font-size="7" fill="#00FF88" opacity="0.25" font-family="monospace">IRQ</text>
  <text x="52" y="30" font-size="7" fill="#00E5FF" opacity="0.2" font-family="monospace">DMA</text>
  <text x="84" y="30" font-size="7" fill="#00FF88" opacity="0.2" font-family="monospace">ADC</text>
  <!-- circuit traces left -->
  <circle cx="150" cy="20" r="3" fill="#00E5FF" opacity="0.7"/>
  <line x1="150" y1="20" x2="150" y2="8" stroke="#00E5FF" stroke-width="1" opacity="0.55"/>
  <line x1="150" y1="8" x2="200" y2="8" stroke="#00E5FF" stroke-width="1" opacity="0.55"/>
  <circle cx="200" cy="8" r="2" fill="#00FF88" opacity="0.6"/>
  <circle cx="260" cy="20" r="3" fill="#00FF88" opacity="0.7"/>
  <line x1="260" y1="20" x2="260" y2="32" stroke="#00FF88" stroke-width="1" opacity="0.55"/>
  <line x1="260" y1="32" x2="320" y2="32" stroke="#00FF88" stroke-width="1" opacity="0.55"/>
  <circle cx="320" cy="32" r="2" fill="#00E5FF" opacity="0.6"/>
  <line x1="320" y1="32" x2="360" y2="32" stroke="#00E5FF" stroke-width="0.8" opacity="0.4"/>
  <line x1="360" y1="32" x2="360" y2="20" stroke="#00E5FF" stroke-width="0.8" opacity="0.4"/>
  <!-- center ESP32 chip -->
  <rect x="405" y="8" width="90" height="24" rx="3" fill="#0D1117" stroke="#00E5FF" stroke-width="1" opacity="0.8"/>
  <rect x="409" y="12" width="82" height="16" rx="1" fill="#060D18" stroke="#0A2A4A" stroke-width="0.5"/>
  <text x="450" y="23" text-anchor="middle" font-size="8" fill="#00E5FF" font-family="monospace" opacity="0.9">ESP32</text>
  <circle cx="407" cy="10" r="2" fill="#00E5FF" opacity="0.5"/>
  <line x1="380" y1="20" x2="405" y2="20" stroke="#00E5FF" stroke-width="1" opacity="0.6"/>
  <line x1="495" y1="20" x2="520" y2="20" stroke="#00E5FF" stroke-width="1" opacity="0.6"/>
  <!-- right traces -->
  <circle cx="540" cy="20" r="3" fill="#00FF88" opacity="0.7"/>
  <line x1="540" y1="20" x2="540" y2="8" stroke="#00FF88" stroke-width="1" opacity="0.55"/>
  <line x1="540" y1="8" x2="600" y2="8" stroke="#00FF88" stroke-width="1" opacity="0.55"/>
  <circle cx="600" cy="8" r="2" fill="#00E5FF" opacity="0.6"/>
  <circle cx="660" cy="20" r="3" fill="#00E5FF" opacity="0.7"/>
  <line x1="660" y1="20" x2="660" y2="32" stroke="#00E5FF" stroke-width="1" opacity="0.55"/>
  <line x1="660" y1="32" x2="720" y2="32" stroke="#00E5FF" stroke-width="1" opacity="0.55"/>
  <circle cx="720" cy="32" r="2" fill="#00FF88" opacity="0.6"/>
  <!-- binary right -->
  <text x="760" y="17" font-size="7" fill="#00FF88" opacity="0.35" font-family="monospace">0x1A</text>
  <text x="795" y="17" font-size="7" fill="#00E5FF" opacity="0.3" font-family="monospace">0xCC</text>
  <text x="830" y="17" font-size="7" fill="#00FF88" opacity="0.25" font-family="monospace">0x7F</text>
  <text x="760" y="30" font-size="7" fill="#00E5FF" opacity="0.25" font-family="monospace">PWM</text>
  <text x="794" y="30" font-size="7" fill="#00FF88" opacity="0.2" font-family="monospace">CLK</text>
  <text x="824" y="30" font-size="7" fill="#00E5FF" opacity="0.2" font-family="monospace">MOSI</text>
</svg>
