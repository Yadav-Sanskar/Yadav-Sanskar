<svg width="120" height="130" viewBox="0 0 120 130" xmlns="http://www.w3.org/2000/svg">
  <!-- No background — fully transparent -->

  <!-- Cup body -->
  <path d="M35 18 L85 18 L80 65 L40 65 Z" fill="url(#goldGrad)" opacity="0.95"/>

  <!-- Gold gradient -->
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5D060"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#A07830"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F5D060"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
  </defs>

  <!-- Cup top rim -->
  <ellipse cx="60" cy="18" rx="25" ry="7" fill="#F5D060" opacity="0.95"/>

  <!-- Cup shine highlight -->
  <path d="M42 24 Q50 20 58 24 Q54 40 48 50 Q43 40 42 24 Z" fill="#FFF8DC" opacity="0.18"/>

  <!-- Handle left -->
  <path d="M35 26 Q16 26 16 42 Q16 58 35 58" fill="none" stroke="#C9A84C" stroke-width="7" stroke-linecap="round"/>
  <path d="M35 26 Q16 26 16 42 Q16 58 35 58" fill="none" stroke="#F5D060" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- Handle right -->
  <path d="M85 26 Q104 26 104 42 Q104 58 85 58" fill="none" stroke="#C9A84C" stroke-width="7" stroke-linecap="round"/>
  <path d="M85 26 Q104 26 104 42 Q104 58 85 58" fill="none" stroke="#F5D060" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- Star inside cup -->
  <text x="60" y="50" text-anchor="middle" font-size="22" fill="#FFF8DC" opacity="0.95" font-family="Arial">★</text>

  <!-- Stem -->
  <rect x="53" y="65" width="14" height="18" rx="2" fill="url(#goldGrad)"/>
  <rect x="55" y="65" width="4" height="18" rx="1" fill="#F5D060" opacity="0.3"/>

  <!-- Base plate -->
  <rect x="30" y="83" width="60" height="10" rx="4" fill="url(#goldGrad2)"/>
  <rect x="32" y="85" width="56" height="4" rx="2" fill="#F5D060" opacity="0.3"/>

  <!-- Base bottom -->
  <rect x="36" y="93" width="48" height="6" rx="3" fill="#C9A84C"/>

  <!-- Glow effect under trophy -->
  <ellipse cx="60" cy="100" rx="30" ry="5" fill="#C9A84C" opacity="0.15"/>
</svg>
