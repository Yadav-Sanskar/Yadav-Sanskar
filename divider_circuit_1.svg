  <line x1="390" y1="20" x2="410" y2="20" stroke="#00E5FF" stroke-width="1" opacity="0.6"/>
  <line x1="490" y1="20" x2="510" y2="20" stroke="#00E5FF" stroke-width="1" opacity="0.6"/>
