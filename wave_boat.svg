<svg width="900" height="120" viewBox="0 0 900 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="120" fill="#0D1117"/>

  <!-- Deep water background -->
  <rect x="0" y="55" width="900" height="65" fill="#041828" opacity="0.9"/>

  <!-- Wave layer 3 - back - dark blue -->
  <path d="M0 72 Q50 58 100 72 Q150 86 200 72 Q250 58 300 72 Q350 86 400 72 Q450 58 500 72 Q550 86 600 72 Q650 58 700 72 Q750 86 800 72 Q850 58 900 72 L900 120 L0 120 Z" fill="#0A2A4A" opacity="0.7"/>

  <!-- Wave layer 2 - mid - cyan tint -->
  <path d="M0 80 Q45 66 90 80 Q135 94 180 80 Q225 66 270 80 Q315 94 360 80 Q405 66 450 80 Q495 94 540 80 Q585 66 630 80 Q675 94 720 80 Q765 66 810 80 Q855 94 900 80 L900 120 L0 120 Z" fill="#0D3A5A" opacity="0.8"/>

  <!-- Wave layer 1 - front - bright -->
  <path d="M0 90 Q40 76 80 90 Q120 104 160 90 Q200 76 240 90 Q280 104 320 90 Q360 76 400 90 Q440 104 480 90 Q520 76 560 90 Q600 104 640 90 Q680 76 720 90 Q760 104 800 90 Q840 76 880 90 L900 90 L900 120 L0 120 Z" fill="#082038" opacity="0.9"/>

  <!-- Wave highlight lines -->
  <path d="M0 80 Q45 66 90 80 Q135 94 180 80 Q225 66 270 80 Q315 94 360 80 Q405 66 450 80 Q495 94 540 80 Q585 66 630 80 Q675 94 720 80 Q765 66 810 80 Q855 94 900 80" fill="none" stroke="#00E5FF" stroke-width="1.2" opacity="0.5"/>
  <path d="M0 90 Q40 76 80 90 Q120 104 160 90 Q200 76 240 90 Q280 104 320 90 Q360 76 400 90 Q440 104 480 90 Q520 76 560 90 Q600 104 640 90 Q680 76 720 90 Q760 104 800 90 Q840 76 880 90" fill="none" stroke="#00E5FF" stroke-width="0.8" opacity="0.35"/>

  <!-- Water sparkles -->
  <circle cx="80" cy="84" r="1.5" fill="#00E5FF" opacity="0.6"/>
  <circle cx="200" cy="77" r="1" fill="#00E5FF" opacity="0.5"/>
  <circle cx="340" cy="85" r="1.5" fill="#00E5FF" opacity="0.55"/>
  <circle cx="460" cy="76" r="1" fill="#00FF88" opacity="0.5"/>
  <circle cx="580" cy="84" r="1.5" fill="#00E5FF" opacity="0.6"/>
  <circle cx="700" cy="78" r="1" fill="#00E5FF" opacity="0.5"/>
  <circle cx="820" cy="85" r="1.5" fill="#00FF88" opacity="0.55"/>
  <circle cx="150" cy="92" r="1" fill="#00E5FF" opacity="0.4"/>
  <circle cx="420" cy="95" r="1" fill="#00E5FF" opacity="0.4"/>
  <circle cx="650" cy="93" r="1" fill="#00FF88" opacity="0.4"/>

  <!-- BOAT -->
  <!-- Boat hull -->
  <path d="M390 62 L510 62 L525 78 L375 78 Z" fill="#1A3A5A" stroke="#00E5FF" stroke-width="1.2"/>
  <!-- Hull bottom curve -->
  <path d="M375 78 Q450 88 525 78" fill="#142A48" stroke="#00E5FF" stroke-width="1" opacity="0.8"/>
  <!-- Boat deck -->
  <rect x="405" y="52" width="90" height="12" rx="2" fill="#0F2A40" stroke="#00E5FF" stroke-width="0.8"/>
  <!-- Mast -->
  <line x1="450" y1="52" x2="450" y2="10" stroke="#00E5FF" stroke-width="1.5" opacity="0.9"/>
  <!-- Sail 1 - main -->
  <path d="M450 12 L450 48 L490 38 Z" fill="#00E5FF" opacity="0.35" stroke="#00E5FF" stroke-width="0.8"/>
  <!-- Sail 2 - small left -->
  <path d="M450 16 L450 44 L418 36 Z" fill="#00FF88" opacity="0.25" stroke="#00FF88" stroke-width="0.6"/>
  <!-- Flag on top -->
  <path d="M450 10 L462 14 L450 18 Z" fill="#00FF88" opacity="0.8"/>
  <!-- Cabin window -->
  <rect x="430" y="55" width="10" height="7" rx="1" fill="#00E5FF" opacity="0.4" stroke="#00E5FF" stroke-width="0.5"/>
  <rect x="460" y="55" width="10" height="7" rx="1" fill="#00E5FF" opacity="0.4" stroke="#00E5FF" stroke-width="0.5"/>
  <!-- Boat reflection in water -->
  <path d="M400 80 Q450 84 500 80 Q490 90 450 92 Q410 90 400 80 Z" fill="#00E5FF" opacity="0.06"/>

  <!-- Moon / stars top left -->
  <circle cx="60" cy="22" r="12" fill="#0D1117"/>
  <circle cx="54" cy="20" r="10" fill="#1A2A3A" stroke="#00E5FF" stroke-width="0.5" opacity="0.6"/>
  <circle cx="60" cy="22" r="12" fill="#0D1117"/>
  <path d="M52 14 Q66 22 52 30 Q44 22 52 14 Z" fill="#C8A84C" opacity="0.7"/>
  <!-- Stars -->
  <circle cx="120" cy="15" r="1" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="160" cy="25" r="1.2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="200" cy="10" r="0.8" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="260" cy="20" r="1" fill="#FFFFFF" opacity="0.55"/>
  <circle cx="320" cy="12" r="0.8" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="700" cy="18" r="1" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="760" cy="8" r="1.2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="820" cy="22" r="0.8" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="860" cy="12" r="1" fill="#FFFFFF" opacity="0.55"/>

  <!-- Horizon glow -->
  <rect x="0" y="50" width="900" height="8" fill="#00E5FF" opacity="0.04"/>
  <line x1="0" y1="55" x2="900" y2="55" stroke="#00E5FF" stroke-width="0.5" opacity="0.2"/>
</svg>
