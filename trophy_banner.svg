<svg width="900" height="80" viewBox="0 0 900 80" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="80" fill="#0D1117"/>

  <!-- Section heading bg strip -->
  <rect x="0" y="0" width="900" height="80" fill="#0D1117"/>

  <!-- Left decorative line -->
  <line x1="20" y1="40" x2="220" y2="40" stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>
  <circle cx="20" cy="40" r="3" fill="#C9A84C" opacity="0.6"/>
  <circle cx="100" cy="40" r="2" fill="#C9A84C" opacity="0.4"/>

  <!-- Right decorative line -->
  <line x1="680" y1="40" x2="880" y2="40" stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>
  <circle cx="880" cy="40" r="3" fill="#C9A84C" opacity="0.6"/>
  <circle cx="800" cy="40" r="2" fill="#C9A84C" opacity="0.4"/>

  <!-- TROPHY SVG CENTER -->
  <!-- Cup body -->
  <path d="M430 15 L470 15 L465 52 L435 52 Z" fill="#C9A84C" opacity="0.9"/>
  <!-- Cup top opening -->
  <ellipse cx="450" cy="15" rx="20" ry="5" fill="#E8C060" opacity="0.9"/>
  <!-- Cup handles left -->
  <path d="M430 22 Q415 22 415 32 Q415 42 430 42" fill="none" stroke="#C9A84C" stroke-width="3" opacity="0.9"/>
  <!-- Cup handles right -->
  <path d="M470 22 Q485 22 485 32 Q485 42 470 42" fill="none" stroke="#C9A84C" stroke-width="3" opacity="0.9"/>
  <!-- Cup stem -->
  <rect x="444" y="52" width="12" height="10" rx="1" fill="#C9A84C" opacity="0.9"/>
  <!-- Cup base -->
  <rect x="432" y="62" width="36" height="6" rx="2" fill="#E8C060" opacity="0.9"/>
  <!-- Star inside cup -->
  <text x="450" y="38" text-anchor="middle" font-size="14" fill="#FFF8E1" opacity="0.9" font-family="Arial">★</text>

  <!-- Title text -->
  <text x="450" y="74" text-anchor="middle" font-size="9" fill="#C9A84C" font-family="monospace" opacity="0.7" letter-spacing="3">GITHUB  TROPHIES</text>
</svg>
